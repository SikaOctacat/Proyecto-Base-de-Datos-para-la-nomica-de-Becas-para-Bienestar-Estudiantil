<div class="step-content">
    <h2>2. Residencia / Vivienda</h2>
    <div class="grid-container">
        <div>
            <label>Tipo de residencia</label>
            <select name="t_res" id="t_res">
                <option value="" disabled selected>Seleccione el tipo...</option>
                <option value="familiar">Familiar</option>
                <option value="particular">Particular</option>
                <option value="universitaria">Universitaria</option>
                <option value="otro">Otro...</option>
            </select>
        </div>

        <div>
            <label>Tipo de vivienda</label>
            <select name="t_viv">
                <option value="" disabled selected>Seleccione el tipo...</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
                <option value="interes_social">Vivienda de interés social</option>
                <option value="rancho">Rancho</option>
            </select>
        </div>

        <div>
            <label>Tipo de localidad</label>
            <select name="t_loc">
                <option value="" disabled selected>Seleccione localidad...</option>
                <option value="urbano">Urbano</option>
                <option value="rural">Rural</option>
            </select>
        </div>

        <div>
            <label>Régimen de propiedad</label>
            <select name="r_prop" id="r_prop">
                <option value="" disabled selected>Seleccione régimen...</option>
                <option value="propia">Propia</option>
                <option value="alquilada">Alquilada</option>
                <option value="cedida">Cedida / Comodato</option>
            </select>
        </div>
        
        <div class="full-width">
            <label>Dirección Local
                <input type="text" name="dir_local" placeholder="Ej: Avenida X, Calle X, Casa Nro X">
            </label>
        </div>
        <div class="full-width">
            <label>Dirección de procedencia
                <input type="text" name="dir_procedencia" placeholder="Ej: Urbanización X, Sector X, Bloque X">
            </label>
        </div>
    </div>
</div>
