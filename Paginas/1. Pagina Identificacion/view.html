<div class="step-content">
    <h2>1. Identificación del Estudiante</h2>
    <div class="grid-container">

        <!-- 
        <div>

        <div>
            <label> Primer nombre 
                <input type="text" name="nombre1" placeholder="Ej: Juan" required>
            </label>
        </div>

        <div>
            <label> Segundo nombre
                <input type="text" name="nombre2" placeholder="Ej: Alberto" required>
            </label>
        </div>

        <div>
            <label> Apellido paterno 
                <input type="text" name="apellido_paterno" placeholder="Ej: Pérez" required>
            </label>
        </div>

        <div>
            <label> Apellido materno
                <input type="text" name="apellido_materno" placeholder="Ej: García" required>
            </label>
        </div>

        <div>
            <label>C.I.
                <input type="text" 
                    name="cedula" 
                    placeholder="Ej: 28123456" 
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    maxlength="9"
                    required>
            </label>
        </div>

        <div>
            <label>Teléfono
                <input type="tel" 
                    name="tel_estudiante" 
                    placeholder="Ej: 04121234567"
                    maxlength="11"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                    pattern="^(0414|0424|0412|0416|0426|0268)[0-9]{7}$"
                    title="Debe ser un formato válido (04XX o 02XX seguido de 7 números)">
            </label>
        </div>

        <div>
            <label>Fecha de Nacimiento
                <input type="date" name="f_nac" id="f_nac" required>
            </label>
        </div>

        <div>
            <label>Edad</label>
            <input type="number" 
                id="edad" 
                name="edad" 
                placeholder="00" 
                readonly 
                tabindex="-1"
                style="background-color: #f0f0f0; cursor: not-allowed; font-weight: bold;">
        </div>
        <div>
            <label>Estado Civil</label>
            <select name="edo_civil">
                <option value="" disabled selected>Seleccione su estado civil...</option>
                <option value="soltero">Soltero/a</option>
                <option value="casado">Casado/a</option>
                <option value="divorciado">Divorciado/a</option>
                <option value="viudo">Viudo/a</option>
            </select>
        </div>

        <div>
            <label>Email
                <input type="email" name="correo" placeholder="ejemplo@gmail.com">
            </label>
        </div>

        <div>
            <label>Código de estudiante
                <input type="text" name="cod_est" placeholder="Ej: INT00..." required>
            </label>
        </div>

        <div>
            <!-- class= 'full-width'-->
            <label>Código del Carnet de la Patria
                <input type="text" 
                        name="C_Patria" 
                        placeholder="Ej: 0012345678 (10 dígitos)" 
                        maxlength="10"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </label>
        </div>

        <div>
            <label>Beneficio al cual aspira</label>
            <select name="edo_civil">
                <option value="" disabled selected>Seleccione su beneficio a obtener...</option>
                <option value="Beca estudiantil">Beca estudiantil</option>
                <option value="Ayudantía">Ayudantía</option>
                <option value="Preparaduría">Preparaduría</option>
            </select>
        </div>

    </div>

    <div class="checkbox-group" style="display: flex; flex-direction: column; gap: 8px; margin-top: 15px;">
         <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            ¿Posees un trabajo?
            <input type="checkbox" name="trabaja" id="check_trabaja" style="width: auto;"> 
        </label> 
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            ¿Viajas frecuentemente?
            <input type="checkbox" name="viaja" style="width: auto;"> 
        </label>
        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            ¿Te encuentras activo en tus estudios?
            <input type="checkbox" name="activo" id="check_activo" style="width: auto;"> 
        </label>
